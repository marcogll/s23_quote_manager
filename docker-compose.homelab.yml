services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-s23}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Configura POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-s23_quotes}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-s23} -d ${POSTGRES_DB:-s23_quotes}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    image: ghcr.io/marcogll/s23_quote_manager/s23_quotemgr:latest
    restart: unless-stopped
    ports:
      - "8799:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-s23}:${POSTGRES_PASSWORD:?Configura POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-s23_quotes}?schema=public
      NEXTAUTH_URL: ${APP_URL:?Configura APP_URL con el dominio HTTPS}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?Configura NEXTAUTH_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_NAME: ${ADMIN_NAME:-}
      PORT: 3000
      HOSTNAME: 0.0.0.0
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --output-document=- http://127.0.0.1:3000/api/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  postgres_data:
