# ============================================================
# Soul:23 Product Editor - Docker Compose (Desarrollo Local)
# Listo para usar sin configuracion adicional
# ============================================================

services:
  # ----------------------------------------------------------
  # PostgreSQL 15
  # ----------------------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: s23_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: soul23_products
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d soul23_products"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - s23_network

  # ----------------------------------------------------------
  # Aplicacion Next.js
  # ----------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: s23_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/soul23_products?schema=public"
      NEXTAUTH_URL: "http://localhost:3000"
      NEXTAUTH_SECRET: "local-dev-secret-cambiar-en-produccion"
      ADMIN_EMAIL: admin@soul23.mx
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin1234
      ADMIN_NAME: Marco Gallegos
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/products"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - s23_network

  # ----------------------------------------------------------
  # (Opcional) pgAdmin para gestionar la base de datos local
  # Descomenta para usarlo:
  # ----------------------------------------------------------
  # pgadmin:
  #   image: dpage/pgadmin4:latest
  #   container_name: s23_pgadmin
  #   restart: unless-stopped
  #   ports:
  #     - "5050:80"
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: admin@local.dev
  #     PGADMIN_DEFAULT_PASSWORD: admin
  #   depends_on:
  #     - db
  #   networks:
  #     - s23_network

# ----------------------------------------------------------
# Volumenes
# ----------------------------------------------------------
volumes:
  postgres_data:
    driver: local

# ----------------------------------------------------------
# Redes
# ----------------------------------------------------------
networks:
  s23_network:
    driver: bridge
